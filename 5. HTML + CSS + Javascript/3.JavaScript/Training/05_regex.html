    <section class="login-section">
        <h2>로그인</h2>
        <div class="form-group">
            <label>아이디</label>
            <input type="text" id="login-id" placeholder="user 입력">
        </div>
        <div class="form-group">
            <label>비밀번호</label>
            <input type="password" id="login-pw" placeholder="qwer1234! 입력">
        </div>

        <button id="btn-login">로그인</button>
    </section>
    <script>
        document.addEventListener('keydown', function(e){
            if(e.key === Enter) {
                alert("비어있는 문자 불가");
            }
        }) 
        const id = "user";
        const pwd = "qwer1234!";
        function login() {
            const inputId = document.getElementById('inputId').value;
            const inputPwd = document.getElementById('inputPwd').value;

            if (inputId === ''|| inputPwd ==='') {
                alert("아이디 또는 비밀번호를 입력해주세요.");
            } else if (inputId !== id || inputPwd !== pwd) {
                alert("아이디 또는 비밀번호가 틀렸습니다.");
            } else {
                alert("로그인 되었습니다.");
            }
        }
        document.addEventListener('keydown', function(e) {
            if(e.key === 'Enter') {
                login();
            }
        });
        //     <로그인>
        //      * 공통 : 비어있는 문자 불가(로그인 버튼 클릭 시)
        //      * const id = "user";   /  const pwd = "qwer1234!"
        //          - 아이디 또는 비밀번호를 입력하지 않을 경우 : alert "아이디 또는 비밀번호를 입력해주세요." 출력 
        //          - 아이디 또는 비밀번호가 일치하지 않을 경우 : alert "아이디 또는 비밀번호가 틀렸습니다." 출력
        //          - 위의 변수와 모두 일치 할 경우 : alert "로그인 되었습니다." 출력 
    </script>


    <section class="portfolio-section">
        <h2>포트폴리오 추가</h2>
        <div class="form-group">
            <label>프로젝트 제목</label>
            <input type="text" id="port-title" placeholder="최대 100글자">
        </div>
        <div class="form-group">
            <label>설명</label>
            <textarea id="port-desc" placeholder="프로젝트 내용을 입력해주세요."></textarea>
        </div>
        <button id="btn-port">새로운 프로젝트 추가하기</button>
        <div id="portfolio-list"></div>

    <script>
        function addPortfolio() {
            const portTitle = document.getElementById('portTitle');
            const portDesc = document.getElementById('portDesc');

            // 제목이 100글자 초과할 경우
            if (portTitle.value.length > 100) {
                alert("제목이 너무 깁니다.");
                return;
            }
            // 제목이 비어있을 경우,
            if(portTitle.value.trim() === '' ) {
                alert("제목을 입력해주세요.");
                return;
            }
            // 설명이 비어있을 경우,
            if(portDesc.value.trim() === '') {
                alert("설명을 입력해주세요.");
                return;
            }

            // 추가하기 성공 시
            const item = document.createElement('div');
            item.className = 'portfolio-item';
            item.innerHTML = `<strong>${portTitle.value}</strong><p style="margin:5px 0 0; font-size:0.9rem;">${portDesc.value}</p>`;
        
            document.getElementById('portfolioList').appendChild(item);

            // 입력창 초기화
            portTitle.value ='';
            portDesc.value = '';
        }
        //     <포트폴리오>
        //      - 제목은 최대 100글자까지 가능
        //      - 제목이 100글자를 초과하면 alert "제목이 너무 깁니다."

        //      * 공통 : 비어있는 문자 불가(새로운 프로젝트 추가하기 버튼 클릭 시)
        //          - 제목이 비어있다면 alert "제목을 입력해주세요"
        //          - 설명이 비어있다면 alert "설명을 입력해주세요."

        //      * 추가하기 성공 시
        //          - 아래의 코드를 참고하여 내용을 추가하세요. (클래스 및 텍스트 노드 추가)

        //             item.innerHTML = `<strong>${portTitle.value}</strong><p style="margin:5px 0 0; font-size:0.9rem;">${portDesc.value}</p>`;
    </script>


    <section class="contact-section">
        <h2>연락하기</h2>
        <div class="form-group">
            <label>이름</label>
            <input type="text" id="contact-name" placeholder="한글 이름">
        </div>
        <div class="form-group">
            <label>이메일</label>
            <input type="email" id="contact-email" placeholder="example@test.com">
        </div>
        <div class="form-group">
            <label>메시지</label>
            <textarea id="contact-msg" maxlength="500" placeholder="메시지를 입력해 주세요 (최대 500자)"></textarea>
            <div class="char-count"><span id="msg-count">0</span> / 500</div>
        </div>
        <button id="btn-contact">전송</button>
    </section>
    <script>
        //     <연락하기>
        //      - 이름 : 한글만 가능
        //      - 이메일 : 이메일 주소가 유효한지 확인   ex) test@test.com
        //      - 메시지 : 사용자가 입력한 글자를 실시간으로 업데이트 / 최대 500글자까지 사용 가능

        //      * 전송 버튼 클릭 시
        //          - 이름에 한글말고 다른게 있으면 alert "이름은 한글만 사용 가능합니다"
        //          - 이메일 주소가 유효하지 않으면 alert "이메일 양식이 유효하지 않습니다."

        //     * 공통 : 비어있는 문자 불가(전송 버튼 클릭 시)
        //          - 이름이 비어있다면 alert "이름을 입력해주세요"
        //          - 이메일이 비어있다면 alert "이메일을 입력해주세요."
        //          - 메시지가 비어있다면 alert "메시지를 입력해주세요."
        document.getElementById('contact-msg').addEventListener('input', function() {
            document.getElementById('msg-count').innerText = this.value.length;
        });
        // 전송 버튼 클릭 시
        document.getElementById('btn=contact').addEventListener('click', function() {
            const name = document.getElementById('contact-name').value;
            const email = document.getElementById('contact-email').value;
            const msg = document.getElementById('contact-msg').value;
            // 정규식
            const koreanRegex = /^[가-힣]+$/;
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

            // 빈값 체크
            if (name.trim() === '') {
                alert("이름을 입력해주세요.");
                return;
            }
            if(email.trim() === '') {
                alert("이메일을 입력해주세요.");
            }
            if(msg.trim() === '') {
                alert("메시지를 입력해주세요.");
                return;
            }

            // 한글 체크
            if(!koreanRegex.test(name)) {
                alert("이메일 양식이 유효하지 않습니다.");
                return ;
            }

            alert("전송되었습니다!");
        });
    </script>


    <section class="join-section">

        <div class="form-group">

        </div>
        <div class="form-group">

    <script>
        const nameRegex = /^[가-힣]+$/;
        const idRegex = /^[a-z0-9_-]{5,20}$/;
        const pwRegex = /^(?=.*[a-zA-Z])(?=.*[0-9])(?=.*[!@#$%^&*])[a-zA-Z0-9!@#$%^&*]{8,16}$/;
        // -------------------------- 이름 keyup-------------------------------------
        document.getElementById9('join-name').addEventListener('keyup', function() {
            const msgName = document.getElementById('msg-name');
            if(!nameRegex.test(this.value)) {
                msgName.innerText = "한글만 사용 가능합니다.";
                msgName.style.color ="red";
            } else {
                msgName.innerText = "";
            }
        });
        // -------------------------- 아이디 keyup --------------------------------
        document.getElementById('join-id').addEventListener('keyup', function() {
            const msgId = document.getElementById('msg-id');
            if(!idRegex.test(this.value)) {
                msgId.innerText = "5~20자의 영문 소문자, 숫자와 특수기호(_),(-)만 사용 가능합니다.";
                msgId.style.color = "red";
            } else {
                msgId.innerText = "사용 가능한 아이디입니다.";
                msgId.style.color = "green";
            }
        });
        // ------------------------------ 비밀번호 확인 keyup ---------------------------------------
        document.getElementById('join-pw2').addEventListener('keyup', checkPw2);

        function checkPw2() {
            const pw = document.getElementById('join-pw').value;
            const pw2 = document.getElementById('join-pw2').value;
            const msgPw2 = document.getElementById('msg-pw2');

            if (pw === '') {
                msgPw2.innerText = "";
                return;
            }
            if (pw !== pw2) {
                msgPw2.innerText = "비밀번호가 일치하지 않습니다.";
                msgPw2.style.color = "red";
            } else {
                msgPw2.innerText = "비밀번호가 일치합니다.";
                msgPw2.style.color = "green";
            }
        }
        // ---------------------- 회원가입 버튼 클릭 ----------------------------------
        document.getElementById('btn-join').addEventListener('click', function(){
            const name = document.getElementById('join-name').value;
            const id = document.getElementById('join-id').value;
            const pw = document.getElementById('join-pw').value;
            const pw2 = document.getElementById('join-pw2').value;

            // 빈값 체크
            if (name.trim() === '') {
                alert("이름을 입력해주세요.");
                return;
            }
            if(id.trim() === '') {
                alert("아이디를 입력해주세요.");
                return;
            }
            if(pw.trim() === '') {
                alert("비밀번호를 입력해주세요!");
            }
            if(pw !== pw2) {
                alert("비밀번호가 일치하지 않습니다.");
                return;
            }

            // 유효성 검사 전체 통과 확인
            if(!nameRegex.test(name) || !idRegex.test(id) || !pwRegex.test(pw)) {
                alert("입력값을 다시 확인해주세요.");
                return;
            }

            alert("회원가입이 완료되었습니다.");
        });
        //     <회원가입>
        //      - 이름 : 한글만 가능
        //      - 아이디 : 영어, 숫자, 특수기호(_),(-)만 가능 / 5자 이상 20자 이하
        //      - 비밀번호 : 대소문자 또는 특수문자, 숫자 최소 1개 이상 / 8자리 이상 16자 이하
        //      - 비밀번호 확인 : 비밀번호와 동일해야 함

        //      * 일치하지 않을 경우 input의 아래 부분에 텍스트 출력(keyup 이벤트 활용)
        //          - 이름이 일치하지 않을 경우 : "한글만 사용 가능합니다."    // 색상 red
        //          - 이름이 일치할 경우 : ""   (빈 문자열 출력)

        //      - 아이디가 일치하지 않을 경우 : "5~20자의 영문 소문자, 숫자와 특수기호(_),(-)만 사용 가능합니다."    // 색상 red
        //      - 아이디가 일치할 경우 : "사용 가능한 아이디입니다."    // 색상 green

        //      - 비밀번호가 일치하지 않을 경우 : "8~16자의 영문 대/소문자, 숫자, 특수문자를 사용해 주세요."    // 색상 red

        //      - 비밀번호 확인이 비밀번화 일치할 경우 : "비밀번호가 일치합니다."    // 색상 green

        //      * 공통 : 비어있는 문자 불가(회원 가입 버튼 클릭 시) 
        //          - 비어있다면 alert "이름을 입력해주세요."
        //          - 아이디가 비어있다면 alert "아이디를 입력해주세요."
        //          - 비밀번호가 비어있다면 alert "비밀번호를 입력해주세요."
        //          - 비밀번호 확인이 일치하지 않는다면 alert "비밀번호가 일치하지 않습니다"

	    //	    * 공통 : 모든 유효성 검사가 통과해야 회원가입 버튼 클릭 시 "회원가입이 완료되었습니다" alert 출력
	    // 		    - 유효성 검사가 1개라도 실패했다면 "입력값을 다시 확인해주세요." alert 출력
        
        // 정규식 패턴
        const regexJoinName = /^[가-힣]+$/;
        const regexJoinID = /^[a-z0-9_-]{5,20}$/;

        // 아이디
        joinId.addEventListener('keyup', () => {

            } else {
                msgId.textContent = '사용 가능한 아이디입니다.';
