<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>회원 상세</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="user-detail.css" />
</head>

<body>

    <!-- 헤더 -->
    <header>
        <div class="logo">⚡ AdminPanel</div>
        <div class="header-right">
            <span class="user-info">hong@example.com</span>
            <button class="btn-logout" onclick="location.href='login.html'">🚪 로그아웃</button>
        </div>
    </header>

    <div class="layout">

        <!-- 사이드 메뉴 -->
        <aside>
            <div class="menu-title">메뉴</div>
            <nav>
                <a href="user-list.html" class="active">
                    <span class="icon">👥</span> 회원 목록
                </a>
            </nav>
        </aside>

        <!-- 컨텐츠 영역 -->
        <main>

            <div class="page-header">
                <div>
                    <div class="page-title">회원 상세</div>
                </div>
            </div>

            <div class="detail-card">

                <div class="detail-row">
                    <span class="detail-label">ID</span>
                    <span class="detail-value">1</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">이름</span>
                    <span class="detail-value">홍길동</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">이메일</span>
                    <span class="detail-value">hong@example.com</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">전화번호</span>
                    <span class="detail-value">010-1234-5678</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">주소</span>
                    <span class="detail-value">서울특별시</span>
                </div>
                <div style="margin-top: 32px; padding: 0 28px 28px;">
                    <button class="btn-list" onclick="goList()">목록으로</button>
                </div>

            </div>
        </main>

    </div>

    <script src="user-detail.js"></script>

</body>

</html>
