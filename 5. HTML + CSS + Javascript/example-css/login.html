<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>로그인</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #f4f6f9;
            font-family: 'Noto Sans KR', sans-serif;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 48px 40px 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
        }

        .card h1 {
            font-size: 26px;
            font-weight: 700;
            color: #111827;
            margin-bottom: 8px;
        }

        .card p.subtitle {
            font-size: 14px;
            color: #6b7280;
            margin-bottom: 32px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #374151;
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            padding: 11px 14px;
            border: 1.5px solid #e5e7eb;
            border-radius: 8px;
            font-size: 15px;
            font-family: inherit;
            color: #111827;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: #2563eb;
        }

        .error-msg {
            margin-top: 8px;
            font-size: 13px;
            color: #ef4444;
            display: none;
        }

        .btn-login {
            width: 100%;
            padding: 13px;
            margin-top: 8px;
            background-color: #2563eb;
            color: white;
            font-size: 15px;
            font-weight: 600;
            font-family: inherit;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn-login:hover {
            background-color: #1d4ed8;
        }

        .btn-login:active {
            background-color: #1e40af;
        }
    </style>
</head>

<body>

    <div class="card">
        <h1>로그인</h1>
        <p class="subtitle">계정 정보를 입력해 주세요.</p>

        <div class="form-group">
            <label for="email">이메일</label>
            <input type="email" id="email" placeholder="이메일을 입력하세요" />
        </div>

        <div class="form-group">
            <label for="password">비밀번호</label>
            <input type="password" id="password" placeholder="비밀번호를 입력하세요" />
            <p class="error-msg" id="errorMsg">이메일 또는 비밀번호가 올바르지 않습니다.</p>
        </div>

        <button class="btn-login" onclick="login()">로그인</button>
    </div>

    <script>
        function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');

            if (email === 'hong@example.com' && password === 'qwer1234') {
                location.href = 'user-list.html';
            } else {
                errorMsg.style.display = 'block';
            }
        }

        // Enter 키로도 로그인 가능
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') login();
        });
    </script>

</body>

</html>
