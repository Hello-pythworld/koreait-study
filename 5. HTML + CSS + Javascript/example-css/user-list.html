<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>회원 목록</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="user-list.css" />
</head>

<body>

    <!-- 헤더 -->
    <header>
        <div class="logo">⚡ AdminPanel</div>
        <div class="header-right">
            <span class="user-info">hong@example.com</span>
            <button class="btn-logout" onclick="location.href='login.html'">🚪 로그아웃</button>
        </div>
    </header>

    <div class="layout">

        <!-- 사이드 메뉴 -->
        <aside>
            <div class="menu-title">메뉴</div>
            <nav>
                <a href="#" class="active">
                    <span class="icon">👥</span> 회원 목록
                </a>
            </nav>
        </aside>

        <!-- 컨텐츠 영역 -->
        <main>
            <div class="page-title">회원 목록</div>

            <div class="table-card">
                <div class="table-header">
                    <span>회원 관리</span>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>Id</th>
                            <th>이름</th>
                            <th>이메일</th>
                            <th>상세</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>1</td>
                            <td>홍길동</td>
                            <td>hong@example.com</td>
                            <td><button class="btn-view" onclick="goDetail(1)">보기</button></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>

    </div>

    <script src="user-list.js"></script>

</body>

</html>
